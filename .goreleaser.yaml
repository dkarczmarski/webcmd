version: 2

project_name: webcmd

before:
  hooks:
    - go mod tidy

builds:
  - id: webcmd
    main: ./cmd/main.go
    binary: webcmd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: linux_archives
    ids:
      - webcmd
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  use: github
