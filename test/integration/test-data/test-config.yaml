authorization:
  - name: auth-name1
    key: ABC111
  - name: auth-name2
    key: ABC222
urlCommands:
  - url: POST /cmd/echo
    authorizationName: auth-name1,auth-name2
    commandTemplate: |
      /bin/echo
      {{.url.param1}}
    timeout: 5
  - url: GET /cmd/date
    commandTemplate: |
      /usr/bin/date
      +%Y-%m-%d %H:%M:%S
    timeout: 5
  - url: POST /cmd/echo-text
    commandTemplate: |
      /bin/echo
      -n
      {{.body.text}}
    timeout: 5
  - url: POST /cmd/echo-json
    commandTemplate: |
      /bin/echo
      -n
      {{.body.json}}
    params:
      bodyAsJson: true
    timeout: 5