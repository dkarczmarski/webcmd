server:
  address: "localhost:8080"
authorization:
  - name: auth-name1
    key: MYSECRETKEY
urlCommands:
  - url: POST /cmd/echo
    authorizationName: auth-name1
    commandTemplate: |
      /bin/echo
      {{.url.message}}
    timeout: 30
  - url: GET /cmd/date
    commandTemplate: |
      /usr/bin/date
      +%Y-%m-%d %H:%M:%S
    timeout: 30
  - url: GET /stream/time
    commandTemplate: |
      bash
      -c
      for i in {1..10}; do echo $i; date '+%H:%M:%S'; sleep 1; done
    outputType: stream
    timeout: 30
  - url: GET /stream/time-with-timeout-5
    commandTemplate: |
      bash
      -c
      for i in {1..10}; do echo $i; date '+%H:%M:%S'; sleep 1; done
    outputType: stream
    timeout: 5
